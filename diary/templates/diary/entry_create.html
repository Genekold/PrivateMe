{% extends "base.html" %}

{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
    }

    /* Левая половина - календарь */
    .calendar-container {
        width: 50%;
        padding: 20px;
        box-sizing: border-box;
        background: #f5f5f5;
        overflow-y: auto;
    }

    /* Правая половина - пустое пространство или ваш контент */
    .content-container {
        width: 50%;
        padding: 20px;
        box-sizing: border-box;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .content-container p {
        color: #888;
        font-size: 18px;
    }

    .calendar {
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        overflow: hidden;
        max-width: 100%;
    }

    .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background: #4CAF50;
        color: white;
    }

    .calendar-header button {
        background: none;
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
    }

    .month-image {
        width: 100%;
        height: 150px;
        background: url('https://via.placeholder.com/800x150?text=Изображение+месяца') no-repeat center;
        background-size: cover;
    }

    .days-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
        padding: 10px;
    }

    .day {
        border: 1px solid #ddd;
        padding: 8px;
        min-height: 60px;
        cursor: pointer;
        font-size: 14px;
    }

    .day:hover {
        background: #f0f0f0;
    }

    .day-number {
        font-weight: bold;
        margin-bottom: 3px;
    }

    .day-note {
        font-size: 11px;
        color: #555;
        word-break: break-word;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: white;
        padding: 20px;
        border-radius: 5px;
        width: 300px;
    }

    .modal textarea {
        width: 100%;
        height: 100px;
        margin: 10px 0;
        resize: none;
    }

    .modal-buttons {
        display: flex;
        justify-content: space-between;
    }

    .modal-buttons button {
        padding: 8px 15px;
        cursor: pointer;
    }

    #save-note {
        background: #4CAF50;
        color: white;
        border: none;
    }

    #cancel-note {
        background: #f44336;
        color: white;
        border: none;
    }

    @media (max-width: 768px) {
        body {
            flex-direction: column;
        }

        .calendar-container,
        .content-container {
            width: 100%;
            height: auto;
        }
    }
</style>
</head>
<body>
<!-- Левая половина - календарь -->
<div class="calendar-container">
    <div class="calendar">
        <div class="calendar-header">
            <button id="prev-month">←</button>
            <h2 id="current-month">Май 2024</h2>
            <button id="next-month">→</button>
        </div>
        <div class="month-image"></div>
        <div class="days-grid" id="days-grid">
            <!-- Дни будут добавлены через JavaScript -->
        </div>
    </div>
</div>

<!-- Правая половина - можно добавить свой контент -->
<div class="content-container">
    <p>Здесь может быть ваша информация, графики или другие элементы</p>
</div>

<!-- Модальное окно для заметок -->
<div class="modal" id="note-modal">
    <div class="modal-content">
        <h3 id="modal-date">1 мая 2024</h3>
        <textarea id="note-text" placeholder="Введите заметку..."></textarea>
        <div class="modal-buttons">
            <button id="save-note">Сохранить</button>
            <button id="cancel-note">Отмена</button>
        </div>
    </div>
</div>

<script>
    let currentDate = new Date();
    let notes = JSON.parse(localStorage.getItem('calendarNotes')) || {};
    let selectedDate = null;

    function updateCalendar() {
        const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        document.getElementById('current-month').textContent = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

        // Обновляем изображение месяца
        document.querySelector('.month-image').style.backgroundImage = `url('https://via.placeholder.com/800x150?text=${monthNames[currentDate.getMonth()]}+${currentDate.getFullYear()}')`;

        const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
        const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();

        let daysHtml = '';

        // Пустые ячейки для дней предыдущего месяца
        for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
            daysHtml += `<div class="day"></div>`;
        }

        // Ячейки текущего месяца
        for (let i = 1; i <= daysInMonth; i++) {
            const dateKey = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${i}`;
            const note = notes[dateKey] || '';

            daysHtml += `
                <div class="day" data-date="${dateKey}">
                    <div class="day-number">${i}</div>
                    <div class="day-note">${note}</div>
                </div>
            `;
        }

        document.getElementById('days-grid').innerHTML = daysHtml;

        // Добавляем обработчики событий для дней
        document.querySelectorAll('.day').forEach(day => {
            day.addEventListener('click', () => {
                selectedDate = day.dataset.date;
                if (selectedDate) {
                    const [year, month, day] = selectedDate.split('-');
                    const date = new Date(year, month - 1, day);
                    const options = { day: 'numeric', month: 'long', year: 'numeric' };
                    document.getElementById('modal-date').textContent = date.toLocaleDateString('ru-RU', options);
                    document.getElementById('note-text').value = notes[selectedDate] || '';
                    document.getElementById('note-modal').style.display = 'flex';
                }
            });
        });
    }

    // Обработчики для кнопок
    document.getElementById('prev-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        updateCalendar();
    });

    document.getElementById('next-month').addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        updateCalendar();
    });

    // Обработчики для модального окна
    document.getElementById('save-note').addEventListener('click', () => {
        if (selectedDate) {
            notes[selectedDate] = document.getElementById('note-text').value;
            localStorage.setItem('calendarNotes', JSON.stringify(notes));
            updateCalendar();
            document.getElementById('note-modal').style.display = 'none';
        }
    });

    document.getElementById('cancel-note').addEventListener('click', () => {
        document.getElementById('note-modal').style.display = 'none';
    });

    // Закрытие модального окна при клике вне его
    window.addEventListener('click', (e) => {
        if (e.target === document.getElementById('note-modal')) {
            document.getElementById('note-modal').style.display = 'none';
        }
    });

    // Инициализация календаря
    updateCalendar();
</script>
{% endblock %}
