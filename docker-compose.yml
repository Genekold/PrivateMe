services:
  db:
    image: postgres:16-alpine
    container_name: private_me_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $POSTGRES_DB -U $POSTGRES_USER" ]
      interval: 30s
      retries: 5
      timeout: 10s
    networks:
      - private_me-network

  app:
    build: .
    container_name: private_me
    restart: unless-stopped
    env_file: .env
    command: >
      sh -c "python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
    networks:
      - private_me-network
    ports:
      - "8000:8000"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/staticfiles
    networks:
      - private_me-network
    depends_on:
      - app

networks:
  private_me-network:
    driver: bridge

volumes:
  postgres-data:
  static_volume: